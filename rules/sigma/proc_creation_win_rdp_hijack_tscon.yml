title: RDP Session Hijacking via Tscon
id: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
status: experimental
description: Detects the use of tscon.exe to hijack an RDP session by passing a destination session ID.
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\tscon.exe'
        CommandLine|contains: '/dest:'
    condition: selection
falsepositives:
    - IT administrators forcefully connecting to specific sessions.
level: high
tags:
    - attack.privilege_escalation
    - attack.lateral_movement
    # T1563.002 = Remote Service Session Hijacking: RDP Hijacking (was T1574,
    # Hijack Execution Flow, which is unrelated) — issue #118.
    - attack.t1563.002