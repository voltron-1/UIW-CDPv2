title: Suspicious PowerShell Encoded Command Execution
id: 11111111-1111-1111-1111-111111111111
status: experimental
description: Detects the use of encoded commands in PowerShell, a common technique for obfuscation.
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains|nocase:
            - ' -enc'
            - ' -EncodedCommand'
            - ' -ec '
    condition: selection
falsepositives:
    - Legitimate administrative scripts that use encoding.
level: medium
tags:
    - attack.execution
    - attack.t1059.001
    - nist.800-53.si_4
    - cis.8
    - nist.csf.de.ae
