# ============================== Filebeat inputs ===============================
# Suburban-SOC Zeek Integration — authoritative config (matches SOP-002)
# Stack: ELK 9.3.2 | Input: Zeek JSON logs via filestream

filebeat.inputs:
  - type: filestream
    id: zeek-logs
    enabled: true
    paths:
      - /storage/PCAP/zeek_logs/*.log
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true

# ============================== Logstash Output ===============================
output.logstash:
  # LOGSTASH_HOST env var allows team members to change target without editing this file.
  # Default: localhost:5044 (works for Docker stack on same host)
  hosts: ["${LOGSTASH_HOST:localhost:5044}"]
  # Encrypt telemetry in transit. Logstash's Beats input serves a CA-signed
  # cert; verify it against the stack CA.
  ssl.enabled: true
  ssl.certificate_authorities: ["${FILEBEAT_CA:/etc/filebeat/certs/ca.crt}"]
  ssl.verification_mode: "${FILEBEAT_SSL_VERIFY:full}"
  # mTLS: Logstash's Beats input requires client authentication
  # (ssl_certificate_authorities is set on the server side). Present a
  # CA-signed client cert as this shipper's identity, or the server rejects
  # the batch with "tls: certificate required".
  ssl.certificate: "${FILEBEAT_CERT:/etc/filebeat/certs/filebeat.crt}"
  ssl.key: "${FILEBEAT_KEY:/etc/filebeat/certs/filebeat.key}"
