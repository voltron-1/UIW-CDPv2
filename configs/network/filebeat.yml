# ============================== Filebeat inputs ===============================
# Suburban-SOC Zeek integration — ships RAW Zeek JSON log lines to Logstash.
# Stack: ELK 9.3.2 | Input: Zeek JSON logs via filestream
#
# IMPORTANT (issue #99): do NOT parse JSON here. Logstash parses [message] in
# its `network_logs` branch; an ndjson parser would consume [message] and leave
# Logstash's json{source=>message} a no-op. The `tags: [network_logs]` is what
# routes Zeek data into the network-telemetry branch instead of the endpoint
# branch (the previous beats-input hard-coded `endpoint_logs` tag mis-routed it).
filebeat.inputs:
  - type: filestream
    id: zeek-logs
    enabled: true
    paths:
      - /storage/PCAP/zeek_logs/*.log
    tags: ["network_logs"]

# ============================== Logstash Output ===============================
output.logstash:
  # LOGSTASH_HOST env var lets team members retarget without editing this file.
  # Default localhost:5044 works for the Docker stack on the same host.
  hosts: ["${LOGSTASH_HOST:localhost:5044}"]
