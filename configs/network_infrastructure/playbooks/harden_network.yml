---
- name: Harden Cisco IOS Network Devices
  hosts: switches, routers
  gather_facts: false
  tasks:
    - name: Ensure strong secret for local admin and remove default cisco user
      cisco.ios.ios_config:
        lines:
          - username admin privilege 15 algorithm-type scrypt secret "{{ lookup('env', 'ANSIBLE_NET_NEW_SECRET') | default('StrongSecret123!', true) }}"
          - no username cisco

    - name: Disable insecure management protocols (HTTP)
      cisco.ios.ios_config:
        lines:
          - no ip http server
          - no ip http secure-server

    - name: Configure SSHv2 securely
      cisco.ios.ios_config:
        lines:
          - ip domain-name uiw.local
          - crypto key generate rsa modulus 2048
          - ip ssh version 2
          - ip ssh time-out 60
          - ip ssh authentication-retries 3

    - name: Secure VTY lines (Disable Telnet, Force SSH)
      cisco.ios.ios_config:
        lines:
          - transport input ssh
          - login local
          - exec-timeout 5 0
        parents: "line vty 0 4"

    - name: Secure VTY lines 5-15 (Disable Telnet, Force SSH)
      cisco.ios.ios_config:
        lines:
          - transport input ssh
          - login local
          - exec-timeout 5 0
        parents: "line vty 5 15"

    - name: Save running configuration to startup configuration
      cisco.ios.ios_command:
        commands:
          - write memory
