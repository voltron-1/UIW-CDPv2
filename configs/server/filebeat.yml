# ============================== Filebeat inputs ===============================
# Server/host Zeek integration — identical contract to configs/network/filebeat.yml.
# Ships RAW Zeek JSON lines (no ndjson parser — see issue #99) tagged network_logs.
# Consolidation of the duplicate Filebeat configs is tracked in issue #124.
filebeat.inputs:
  - type: filestream
    id: zeek-logs
    enabled: true
    paths:
      - /storage/PCAP/zeek_logs/*.log
    tags: ["network_logs"]

# ============================== Logstash Output ===============================
output.logstash:
  hosts: ["${LOGSTASH_HOST:localhost:5044}"]
