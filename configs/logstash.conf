# =============================================================================
# Suburban-SOC / UIW CDP — Logstash security pipeline
# MIRROR COPY: kept byte-identical (below the header) with the DEPLOYED file at
# scripts/setup/configs/logstash/logstash.conf, which docker-compose.yml mounts.
# Consolidation to a single source of truth is tracked in issue #105.
#
# Inputs (issue #99 — route by the tag the shipping Beat sets, not a hard-coded one):
#   beats :5044  — Filebeat (Zeek logs,  tag: network_logs)
#                  Winlogbeat (Sysmon,   tag: endpoint_logs)   [issue #100]
#   http  :5514  — direct JSON posters (tag: network_logs)
#
# NOTE: pipeline changes are static-only — NOT runtime-validated against a live
# stack (no cluster available at edit time). See issues #99, #100, #105.
# =============================================================================
input {
  beats {
    port => 5044
    # Tags are provided by the shipping Beat (filebeat => network_logs,
    # winlogbeat => endpoint_logs). Do NOT hard-code a tag here, or Zeek data
    # gets mis-routed into the endpoint branch and is never parsed (issue #99).
  }
  http {
    port => 5514
    tags => ["network_logs"]
  }
}

filter {
  # --- Category 1: Network & Application Telemetry (Zeek) ---
  if "network_logs" in [tags] {
    # Zeek ships one JSON object per line in [message]; parse only JSON lines.
    if [message] =~ /^\s*\{.*\}\s*$/ {
      json {
        source => "message"
        target => "network_parsed"
      }
    }

    # Derive event.dataset from the Zeek log filename (conn.log -> zeek.conn) so
    # Watchers / verify_detections.py can select by dataset (issues #99, #102).
    if [log][file][path] {
      grok {
        match => { "[log][file][path]" => "/(?<zeek_logname>[a-z0-9_]+)\.log$" }
        tag_on_failure => []
      }
      if [zeek_logname] {
        mutate {
          add_field    => { "[event][dataset]" => "zeek.%{zeek_logname}" }
          remove_field => ["zeek_logname"]
        }
      }
    }

    # Map raw Zeek fields to NESTED ECS fields (e.g. [source][ip], not source.ip).
    mutate {
      rename => {
        "[network_parsed][id.orig_h]"    => "[source][ip]"
        "[network_parsed][id.resp_h]"    => "[destination][ip]"
        "[network_parsed][id.orig_p]"    => "[source][port]"
        "[network_parsed][id.resp_p]"    => "[destination][port]"
        # ECS: network.transport = tcp/udp/icmp (Zeek `proto`);
        #      network.protocol  = app proto http/dns/ssl (Zeek `service`).
        # (Previously inverted — issue #115.)
        "[network_parsed][proto]"        => "[network][transport]"
        "[network_parsed][service]"      => "[network][protocol]"
        # Phase A SOAR MAC enrichment (needs @load .../conn/mac-logging in
        # local.zeek). Restored to the deployed copy — issue #105.
        "[network_parsed][orig_l2_addr]" => "[source][mac]"
        "[network_parsed][resp_l2_addr]" => "[destination][mac]"
        "[network_parsed][query]"        => "[dns][question][name]"
        "[network_parsed][qtype_name]"   => "[dns][question][type]"
        "[network_parsed][rcode_name]"   => "[dns][response][code]"
        "[network_parsed][method]"       => "[http][request][method]"
        "[network_parsed][status_code]"  => "[http][response][status_code]"
        # Preserve Zeek notice/ssh signals the network Watchers key on.
        "[network_parsed][note]"         => "[zeek][notice][note]"
        "[network_parsed][auth_success]" => "[zeek][ssh][auth_success]"
      }
    }

    if [source][ip] {
      geoip { source => "[source][ip]" target => "[source][geo]" }
    }
    if [destination][ip] {
      geoip { source => "[destination][ip]" target => "[destination][geo]" }
    }
  }

  # --- Category 2: Host, Process & Identity Telemetry (Winlogbeat/Sysmon) ---
  if "endpoint_logs" in [tags] {
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate {
        add_field => { "[event][dataset]" => "sysmon" }
        rename => {
          "[winlog][event_data][Image]"          => "[process][executable]"
          # ECS process.command_line is what the proc_creation_win_* detections
          # query — NOT process.args (issue #100).
          "[winlog][event_data][CommandLine]"    => "[process][command_line]"
          "[winlog][event_data][ParentImage]"    => "[process][parent][executable]"
          "[winlog][event_data][User]"           => "[user][name]"
          "[winlog][event_data][TargetUserName]" => "[user][target][name]"
        }
      }
    }

    # Linux auth.log (host SSH) — parse to ECS.
    if [log][file][path] =~ "auth.log" {
      grok {
        match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:[host][name]} sshd\[%{POSINT:[process][pid]}\]: %{WORD:[event][outcome]} %{WORD:[system][auth][method]} for %{USER:[user][name]} from %{IP:[source][ip]} port %{POSINT:[source][port]}" }
      }
    }
  }

  # --- Category 3: Operational Metadata Enrichment ---
  mutate {
    add_field => { "[@metadata][pipeline]" => "security-enrichment" }
  }

  # --- Category 4: Threat Detection & Alerting ---
  # Indicators live in a hot-reloaded dictionary; no IOC is hardcoded here.
  # Read the NESTED ECS fields the renames above produce (was [source.ip] — a
  # literal dotted key that never existed — issue #99).
  translate {
    source           => "[source][ip]"
    target           => "[threat][src_intel]"
    dictionary_path  => "/usr/share/logstash/config/threat_intel.yml"
    refresh_interval => 300
  }
  translate {
    source           => "[destination][ip]"
    target           => "[threat][dst_intel]"
    dictionary_path  => "/usr/share/logstash/config/threat_intel.yml"
    refresh_interval => 300
  }
  if [threat][src_intel] or [threat][dst_intel] {
    mutate {
      add_tag => ["CRITICAL_THREAT"]
    }
  }
}

output {
  elasticsearch {
    # ES runs with security ON (HTTPS + auth + CA-signed certs) per CDP §6.
    hosts    => ["https://elasticsearch:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    # logstash-security-* is pinned to a data stream + ILM; write with create.
    index       => "logstash-security-default"
    action      => "create"
    data_stream => false
  }

  # Push notification on a known-malicious indicator hit.
  if "CRITICAL_THREAT" in [tags] {
    http {
      url => "https://ntfy.sh/${NTFY_TOPIC}"
      http_method => "post"
      format => "message"
      # Use the nested ECS field (was %{source.ip} — never resolved — issue #99).
      message => "CRITICAL ALERT: Malicious IP detected on your network! IP: %{[source][ip]}"
      headers => {
        "Title" => "Suburban-SOC Alert"
        "Priority" => "high"
        "Tags" => "warning,skull"
      }
    }
  }
}
