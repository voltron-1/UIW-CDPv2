input {
  beats {
    port => 5044
  }
}

filter {
  # 1. JSON Processing & Validation
  # Filebeat is already parsing the NDJSON, but if raw Zeek strings ever hit this pipeline, it parses them safely.
  if [message] =~ /^{.*}$/ {
    json {
      source => "message"
    }
  }
  
  # 2. Rename Zeek fields to Elastic Common Schema (ECS) for Kibana compatibility
  # Zeek uses 'id.orig_h' (Source IP) and 'id.resp_h' (Destination IP)
  mutate {
    rename => { 
      "id.orig_h" => "[source][ip]" 
      "id.orig_p" => "[source][port]"
      "id.resp_h" => "[destination][ip]"
      "id.resp_p" => "[destination][port]"
    }
  }

  # 3. GeoIP Enrichment
  # Automatically locate the geographical origin of external IPs for SOC dashboards
  if [destination][ip] {
    geoip {
      source => "[destination][ip]"
      target => "[destination][geo]"
    }
  }
  if [source][ip] {
    geoip {
      source => "[source][ip]"
      target => "[source][geo]"
    }
  }
}

output {
  # Output the enriched, structured data to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    # Never hardcode production passwords.
    password => "${ELASTIC_PASSWORD:changeme}"
  }
}
