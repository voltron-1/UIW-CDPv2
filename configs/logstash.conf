input {
  # Standard Beats input for endpoint logs (Winlogbeat / Sysmon / Filebeat).
  # TLS terminated here so Filebeat/Winlogbeat->Logstash telemetry is encrypted
  # in transit (no plaintext on :5044). ssl_certificate_authorities alone only
  # lets the plugin validate a client cert IF one is presented — it does not
  # require one. ssl_client_authentication => "required" is what actually
  # enforces mTLS: without it a certless client can still complete the
  # handshake and ship events. Every real shipper presents a cert signed by
  # the same CA, generated by generate_certs.sh.
  beats {
    port => 5044
    tags => ["endpoint_logs"]
    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash/logstash.key"
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
    ssl_client_authentication => "required"
  }

  # Network tap input (Zeek / Suricata / Syslog)
  http {
    port => 5514
    tags => ["network_logs"]
  }
}

filter {
  # --- Category 1: Network & Application Telemetry ---
  if "network_logs" in [tags] {
    # Parse standard Zeek/Suricata JSON outputs if applicable
    json {
      source => "message"
      target => "network_parsed"
    }
    
    # Map raw fields to ECS Network & Application fields + Zeek IPs
    mutate {
      rename => {
        "[network_parsed][id.orig_h]"   => "source.ip"
        "[network_parsed][id.resp_h]"   => "destination.ip"
        "[network_parsed][id.orig_p]"   => "source.port"
        "[network_parsed][id.resp_p]"   => "destination.port"
        "[network_parsed][proto]"       => "network.protocol"
        "[network_parsed][service]"     => "network.transport"
        "[network_parsed][query]"       => "dns.question.name"
        "[network_parsed][qtype_name]"  => "dns.question.type"
        "[network_parsed][rcode_name]"  => "dns.response.code"
        "[network_parsed][method]"      => "http.request.method"
        "[network_parsed][status_code]" => "http.response.status_code"
        # Phase A: SOAR MAC enrichment — maps Zeek conn MAC fields to ECS
        # Requires @load policy/protocols/conn/mac-logging in local.zeek
        "[network_parsed][orig_l2_addr]" => "source.mac"
        "[network_parsed][resp_l2_addr]" => "destination.mac"
      }
      # The rename above only relocates the allowlisted subfields; anything
      # else in the raw parsed JSON (which could include arbitrary
      # Suricata/Zeek payload content) would otherwise survive untouched to
      # Elasticsearch, bypassing the Category 3.5 data-minimization strip
      # below (which only targets top-level field paths, not [network_parsed]
      # ones). Nothing downstream reads [network_parsed] — safe to drop.
      remove_field => ["network_parsed"]
    }

    # GeoIP Enrichment for Kibana Dashboards. Field-reference fix: the rename
    # above writes FLAT fields literally named "source.ip"/"destination.ip"
    # (bare dotted string as a mutate destination), not nested [source][ip]
    # objects — bracket-wrap the whole flat name as one segment to reference
    # it, matching the convention already used by the Category 4 translate
    # blocks and the Category 5 Ruby signer below.
    if [source.ip] {
      geoip {
        source => "[source.ip]"
        target => "[source][geo]"
      }
    }
    if [destination.ip] {
      geoip {
        source => "[destination.ip]"
        target => "[destination][geo]"
      }
    }
  }

  # --- Category 2: Host, Process, & Identity Telemetry ---
  if "endpoint_logs" in [tags] {
    # If processing Windows Sysmon Events via Winlogbeat
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      mutate {
        rename => {
          "[winlog][event_data][Image]"           => "process.executable"
          "[winlog][event_data][CommandLine]"     => "process.args"
          "[winlog][event_data][ParentImage]"     => "process.parent.name"
          "[winlog][event_data][User]"            => "user.name"
          "[winlog][event_data][TargetUserName]"  => "user.target.name"
        }
      }
    }
    
    # If processing Linux Auth Logs (/var/log/auth.log)
    if [log][file][path] =~ "auth.log" {
      # Cheap literal pre-filter (pipeline-tests): auth.log also carries
      # sudo/cron/PAM lines the sshd pattern below was never written to
      # match. Without this, every one of those lines reaches grok, fails
      # to match, gets tagged _grokparsefailure, and is routed to the
      # quarantine index (Category 3/output stage below) — noise crowding
      # out genuine parse failures in what's meant to be a signal for
      # anomalous input. Gate on the sshd process-tag substring first so
      # non-sshd lines are skipped before grok ever runs. Covers both the
      # classic single `sshd[PID]` process AND OpenSSH 9.8+'s re-exec'd
      # `sshd-session[PID]` / 10.0+'s pre-auth `sshd-auth[PID]` — a host on
      # a current OpenSSH would otherwise silently bypass this pre-filter
      # (no literal "sshd[" substring) and its auth events would never even
      # reach grok, let alone get flagged as a parse failure: a brute-force
      # blind spot, not just missed enrichment.
      if [message] =~ /sshd(-session|-auth)?\[/ {
        # SECURITY (grok anchoring): the username is ATTACKER-CONTROLLED and is
        # echoed BEFORE the client IP that sshd appends. A non-greedy, unanchored
        # capture lets `user=victim from 8.8.8.8 port 22` bind source.ip to the
        # injected IP and drop the real one (source-IP spoof). The pattern is
        # fully anchored (^...$) and the username is GREEDY: the trailing,
        # sshd-supplied `from <ip> port <n>` is always the LAST match and
        # therefore always wins. NOTSPACE (not WORD) covers auth methods like
        # `keyboard-interactive/pam`. timeout_millis bounds worst-case
        # backtracking on adversarial input. `(?:invalid user )?` also captures
        # brute-force attempts against non-existent accounts. `sshd(?:-session|
        # -auth)?\[` matches the classic and both modern OpenSSH process tags.
        grok {
          match => { "message" => "^%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host.name} sshd(?:-session|-auth)?\[%{POSINT:process.pid}\]: %{WORD:event.outcome} %{NOTSPACE:system.auth.method} for (?:invalid user )?%{GREEDYDATA:user.name} from %{IP:source.ip} port %{POSINT:source.port}(?:\s+ssh2)?\s*$" }
          timeout_millis => 1000
        }
      }
    }
  }

  # --- Category 3: Operational Metadata Enrichment ---
  mutate {
    add_field => {
      "[@metadata][pipeline]" => "security-enrichment"
    }
    # Ensure all field copies capture structural tracking metrics
    copy => {
      "[agent][name]" => "agent.hostname"
      "[log][file][path]" => "log.file.path"
    }
  }
  # Tag parse failures so the Data Quality dashboard (and the output stage,
  # below) can route them separately instead of silently mixing malformed
  # input into the primary security data.
  if "_jsonparsefailure" in [tags] or "_grokparsefailure" in [tags] {
    mutate {
      add_field => { "[pipeline][error]" => "true" }
    }
  }

  # --- Category 3.5: Data minimization at ingest ---
  # Keep only what detection & response need. Strip high-risk payload/secret
  # fields that carry user content or credentials but add nothing to security
  # analytics. Dropping them at ingest means they never land in Elasticsearch,
  # snapshots, or the right-to-erasure surface.
  mutate {
    remove_field => [
      "[http][request][body][content]",           # request payloads (form data, uploads)
      "[http][response][body][content]",           # response payloads
      "[http][request][headers][cookie]",           # session cookies
      "[http][request][headers][authorization]",    # bearer/basic creds
      "[http][request][headers][set-cookie]",
      "[url][password]", "[url][username]",         # credentials embedded in URLs
      "[user][password]", "[user][full_name]", "[user][email]" # not needed for detection
    ]
  }
  # Redact obvious secrets left inline in the raw message (password=, token=,
  # api_key=, and their JSON "key":"value" form) and in the grok-extracted
  # user.name — an SSH brute-force attempt can paste a credential into the
  # "invalid user" field, which would otherwise persist it verbatim past the
  # fields stripped above. Two patterns per field:
  #   1. key=value / key: value (syslog-style) — value is matched up to a
  #      whitespace/quote/comma/brace boundary, not \S+, so multi-token
  #      values (e.g. "Bearer <jwt>", quoted strings) are fully covered, not
  #      just their first token.
  #   2. "key":"value" (JSON-style) — the syslog pattern above requires the
  #      value to start right after [=:], but JSON puts a quote there, so it
  #      needs its own pattern to actually match.
  # This is best-effort text redaction, not a substitute for the structural
  # [network_parsed] drop above — it exists for whatever secret-shaped text
  # ends up in `message` itself (e.g. a raw, unparsed line in the quarantine
  # index) rather than in a field the JSON/grok filters already extracted.
  mutate {
    gsub => [
      "message", "(?i)(password|passwd|pwd|token|api[_-]?key|secret|authorization)\s*[=:]\s*[^\s\",}]+", "\1=[REDACTED]",
      "message", "(?i)\"(password|passwd|pwd|token|api[_-]?key|secret|authorization)\"\s*:\s*\"[^\"]*\"", "\"\1\":\"[REDACTED]\"",
      "user.name", "(?i)(password|passwd|pwd|token|api[_-]?key|secret|authorization)\s*[=:]\s*[^\s\",}]+", "\1=[REDACTED]"
    ]
  }

  # --- Category 4: Threat Detection & Alerting ---
  # Tag traffic to/from a known-malicious indicator. Indicators live in a
  # managed dictionary (configs/logstash/threat_intel.yml) refreshed every
  # 5 minutes, so analysts curate intel without editing this pipeline and no
  # IOC is hardcoded here.
  translate {
    source           => "[source.ip]"
    target           => "[threat][src_intel]"
    dictionary_path  => "/usr/share/logstash/config/threat_intel.yml"
    refresh_interval => 300
  }
  translate {
    source           => "[destination.ip]"
    target           => "[threat][dst_intel]"
    dictionary_path  => "/usr/share/logstash/config/threat_intel.yml"
    refresh_interval => 300
  }
  if [threat][src_intel] or [threat][dst_intel] {
    mutate {
      add_tag => ["CRITICAL_THREAT"]
    }
  }

  # --- Category 5: SOAR webhook signing ---
  # The AI agent's /alert endpoint requires an HMAC-SHA256 signature over the
  # exact request body (same scheme the hive-mind-broker uses). Build the body
  # here and sign it so the bytes we sign are the bytes the http output sends.
  # Only structured, already-validated fields go in the body — no free text
  # that could perturb interpolation in the output stage. Replaces the
  # unsigned Watcher-based trigger (rules/elastic_watcher/soar_quarantine_alert.json),
  # which a fail-closed receiver was always going to reject.
  if "CRITICAL_THREAT" in [tags] {
    ruby {
      init => 'require "openssl"; require "json"'
      code => '
        secret = ENV["SOC_AGENT_HMAC_SECRET"].to_s
        # Defense-in-depth: docker-compose.yml forces this var with `:?`, so an
        # empty secret should never reach this filter at runtime — but if it
        # ever did, sign with a blank key and cancel the send rather than
        # emitting a low-entropy, guessable signature.
        if secret.empty?
          event.tag("_soar_unsigned")
        else
          body = {
            "severity"   => "critical",
            "source_ip"  => event.get("[source.ip]").to_s,
            "source_mac" => event.get("[source.mac]").to_s,
            "raw_log"    => "CRITICAL_THREAT: threat-intel indicator match"
          }.to_json
          # Replay protection: sign "<timestamp>." + body and send the timestamp
          # in x-elastic-timestamp; the agent rejects stale/replayed signatures.
          ts = Time.now.to_i.to_s
          sig = "sha256=" + OpenSSL::HMAC.hexdigest("SHA256", secret, ts + "." + body)
          event.set("[@metadata][soar_body]", body)
          event.set("[@metadata][soar_ts]", ts)
          event.set("[@metadata][soar_sig]", sig)
        end
      '
    }
  }
}

output {
  # An event tagged _grokparsefailure/_jsonparsefailure (the [pipeline][error]
  # tag set in the filter stage) is routed to a SEPARATE quarantine index
  # instead of the main data stream, so malformed input no longer silently
  # pollutes the primary security data.
  if [pipeline][error] == "true" {
    elasticsearch {
      hosts    => ["https://elasticsearch:9200"]
      user     => "${LOGSTASH_ES_USER}"
      password => "${LOGSTASH_ES_PASS}"
      ssl_enabled => true
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
      index       => "logstash-security-quarantine"
      action      => "create"
      data_stream => false
    }
  } else {
    elasticsearch {
      # ES runs with security ON (HTTPS + auth + CA-signed certs) per CDP §6,
      # so the output must use https, authenticate, and trust the internal CA.
      # Credentials come from LOGSTASH_ES_USER/LOGSTASH_ES_PASS (set by
      # docker-compose.yml) — a least-privilege writer account, never
      # hardcoded here. Compose currently defaults both to the elastic
      # superuser until that dedicated account is provisioned; override them
      # in .env once it exists.
      hosts    => ["https://elasticsearch:9200"]
      user     => "${LOGSTASH_ES_USER}"
      password => "${LOGSTASH_ES_PASS}"
      ssl_enabled => true
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca/ca.crt"]
      # The cluster pins logstash-security-* to DATA STREAMS (template
      # logstash-security-template, ILM logstash-security-ilm). Data streams only
      # accept op_type=create, so write with action=>"create" into the stream and
      # let ILM handle rollover instead of dating the index name.
      index       => "logstash-security-default"
      action      => "create"
      data_stream => false
    }
  }

  # Push Notification Output (Conditional)
  if "CRITICAL_THREAT" in [tags] {
    http {
      # Topic is injected from the NTFY_TOPIC env var (set in .env); never commit a real topic.
      url => "https://ntfy.sh/${NTFY_TOPIC}"
      http_method => "post"
      format => "message"
      message => "🚨 CRITICAL ALERT: Malicious IP detected on your network! IP: %{source.ip}"
      headers => {
        "Title" => "Suburban-SOC Alert"
        "Priority" => "high"
        "Tags" => "warning,skull"
      }
    }

    # SOAR trigger — replaces the unsigned Watcher-based trigger with a signed
    # request the agent's fail-closed /alert endpoint will actually accept.
    # Body/timestamp/signature were built and signed in the filter stage. Only
    # send if signing actually happened (see the empty-secret guard above) —
    # sending an unsigned/empty body would just be a wasted round-trip against
    # a receiver that rejects it anyway.
    if [@metadata][soar_sig] {
      http {
        url => "http://soc_ai_agent:5000/alert"
        http_method => "post"
        format => "message"
        message => "%{[@metadata][soar_body]}"
        content_type => "application/json"
        headers => {
          "x-elastic-signature" => "%{[@metadata][soar_sig]}"
          "x-elastic-timestamp" => "%{[@metadata][soar_ts]}"
        }
      }
    }
  }
}
