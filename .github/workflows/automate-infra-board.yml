name: Automate Infrastructure Board Setup

on:
  workflow_dispatch: 

permissions:
  issues: write

jobs:
  populate-infra-board:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build Infrastructure Board (Labels, Milestones, Issues)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Setting up Labels..."
          gh label create "Epic: Infrastructure Hardening" --color 0E8A16 --force || true
          gh label create "Task" --color D4C5F9 --force || true
          gh label create "Security" --color D93F0B --force || true

          echo "Setting up Milestones..."
          gh api repos/${{ github.repository }}/milestones -f title="Network & Access Hardening" -f state="open" -f description="Management, AAA, and Layer 2/3 protocols" || true
          gh api repos/${{ github.repository }}/milestones -f title="Transport, App & OS Hardening" -f state="open" -f description="Layer 4-7 protocols, cryptography, and Server OS" || true

          echo "Creating Issues and assigning to @cryptgrphy..."
          
          # Milestone 1: Network & Access Hardening
          gh issue create --title "Task 1.1: Credential Overhaul" \
            --body "Perform a credential overhaul by immediately removing all factory-default usernames and passwords." \
            --label "Task","Security","Epic: Infrastructure Hardening" \
            --milestone "Network & Access Hardening" \
            --assignee "cryptgrphy"

          gh issue create --title "Task 1.2: Disable Insecure Protocols" \
            --body "Disable Telnet and HTTP protocols across all management interfaces." \
            --label "Task","Security","Epic: Infrastructure Hardening" \
            --milestone "Network & Access Hardening" \
            --assignee "cryptgrphy"

          gh issue create --title "Task 2.1: VLAN Segmentation" \
            --body "Implement VLAN segmentation to isolate SOC Management Traffic from the general student network." \
            --label "Task","Security","Epic: Infrastructure Hardening" \
            --milestone "Network & Access Hardening" \
            --assignee "cryptgrphy"

          # Milestone 2: Transport, App & OS Hardening
          gh issue create --title "Task 3.1: TCP SYN Cookies" \
            --body "Force TCP SYN cookies across underlying Linux nodes and firewalls to resist SYN flood resource exhaustion." \
            --label "Task","Security","Epic: Infrastructure Hardening" \
            --milestone "Transport, App & OS Hardening" \
            --assignee "cryptgrphy"

          gh issue create --title "Task 3.3: Enforce mTLS" \
            --body "Mandate mutual TLS (mTLS) for container-to-container and agent-to-SIEM communications." \
            --label "Task","Security","Epic: Infrastructure Hardening" \
            --milestone "Transport, App & OS Hardening" \
            --assignee "cryptgrphy"

          gh issue create --title "Task 4.1: CIS Benchmarks for Linux" \
            --body "Apply CIS Benchmarks to the Linux server hosting the ELK stack for kernel hardening." \
            --label "Task","Security","Epic: Infrastructure Hardening" \
            --milestone "Transport, App & OS Hardening" \
            --assignee "cryptgrphy"
          
          echo "Infrastructure board setup complete!"
