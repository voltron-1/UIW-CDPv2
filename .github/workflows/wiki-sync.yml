# Non-blocking wiki sync: regenerates wiki pages from repo docs after
# merges to main. Never a required check; failures affect nothing else.
name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/wiki/**"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wiki pages
        run: python3 scripts/wiki/build_wiki.py --out wiki-build

      - name: Clone wiki repo
        run: |
          if ! git clone --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki; then
            echo "::warning::Wiki repo not initialized. Enable the wiki and create any first page, then re-run this workflow."
            echo "SKIP_SYNC=1" >> "$GITHUB_ENV"
          fi

      - name: Publish generated pages
        if: env.SKIP_SYNC != '1'
        run: |
          cp wiki-build/*.md wiki/
          cd wiki
          git config user.name "wiki-sync[bot]"
          git config user.email "wiki-sync@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "wiki-sync: regenerate from ${GITHUB_SHA::12}"
            git push
          fi
