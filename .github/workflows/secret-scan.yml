name: Secret Scan

# Scans every push and pull request for committed credentials with gitleaks.
# Uses full history (fetch-depth: 0) so the scan isn't limited to the diff —
# a secret introduced in an earlier commit and later "removed" from the tree
# is still visible in history and should still fail the build.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for a complete scan)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
